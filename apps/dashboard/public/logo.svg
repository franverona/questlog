<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect x="0" y="0" width="100" height="50" rx="22" fill="url(#shine)"/>

  <!-- Star (quest achievement icon) -->
  <polygon
    points="50,13 54.5,27 69,27 57.5,35.5 62,49.5 50,41 38,49.5 42.5,35.5 31,27 45.5,27"
    fill="url(#star-grad)"
    filter="drop-shadow(0 2px 3px rgba(0,0,0,0.25))"
  />

  <!-- Quest log lines (the "log" concept) -->
  <rect x="20" y="57" width="60" height="7" rx="3.5" fill="rgba(255,255,255,0.92)"/>
  <rect x="20" y="70" width="47" height="7" rx="3.5" fill="rgba(255,255,255,0.62)"/>
  <rect x="20" y="83" width="53" height="7" rx="3.5" fill="rgba(255,255,255,0.35)"/>
</svg>
