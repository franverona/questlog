version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: questlog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: questlog
      POSTGRES_PASSWORD: questlog
      POSTGRES_DB: questlog
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
